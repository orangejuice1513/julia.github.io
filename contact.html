<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Julia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Nav -->
  <nav>
    <span class="nav-logo">Julia</span>
    <ul class="nav-links">
      <li><a href="index.html">HOME</a></li>
      <li><a href="projects.html">PROJECTS</a></li>
      <li><a href="contact.html" class="active">CONTACT</a></li>
    </ul>
  </nav>

  <!-- Contact -->
  <main class="page">
    <div class="contact-page">

      <!-- Left: contact info -->
      <div class="contact-left">
        <p class="contact-title">CONTACT</p>

        <div class="contact-links">

          <a href="mailto:juliaj94@stanford.edu" class="contact-item">
            <span class="contact-item-label">Email</span>
            <span class="contact-item-value">your@email.com</span>
            <span class="ext-arrow">&#x2197;</span>
          </a>

          <a href="https://linkedin.com/in/yourprofile" target="_blank" rel="noopener" class="contact-item">
            <span class="contact-item-label">LinkedIn</span>
            <span class="contact-item-value">linkedin.com/in/yourprofile</span>
            <span class="ext-arrow">&#x2197;</span>
          </a>

          <a href="https://github.com/yourusername" target="_blank" rel="noopener" class="contact-item">
            <span class="contact-item-label">GitHub</span>
            <span class="contact-item-value">github.com/yourusername</span>
            <span class="ext-arrow">&#x2197;</span>
          </a>

        </div>
      </div>

      <!-- Right: decorative PCB / circuit trace visual -->
      <div class="contact-right">
        <div class="contact-divider"></div>
        <div class="contact-visual">
          <svg class="circuit-bg" viewBox="0 0 600 700" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
            <defs>
              <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
                <circle cx="20" cy="20" r="1" fill="white"/>
              </pattern>
            </defs>
            <rect width="600" height="700" fill="url(#grid)"/>
            <!-- Circuit traces -->
            <g stroke="white" stroke-width="1" fill="none">
              <path d="M0 120 H180 V200 H340"/>
              <path d="M340 200 V320 H500 V400"/>
              <path d="M0 280 H120 V320 H200"/>
              <path d="M200 320 V440 H360 V520"/>
              <path d="M0 480 H160 V520 H360"/>
              <path d="M360 520 V600 H480"/>
              <path d="M500 400 H600"/>
              <path d="M80 200 V360 H140"/>
              <path d="M420 120 H600"/>
              <path d="M420 120 V240 H480 V320"/>
              <path d="M480 600 H600"/>
              <path d="M160 600 H320"/>
            </g>
            <!-- Junction dots -->
            <g fill="white">
              <circle cx="180" cy="120" r="4"/>
              <circle cx="180" cy="200" r="4"/>
              <circle cx="340" cy="200" r="4"/>
              <circle cx="340" cy="320" r="4"/>
              <circle cx="500" cy="320" r="4"/>
              <circle cx="500" cy="400" r="4"/>
              <circle cx="120" cy="280" r="4"/>
              <circle cx="120" cy="320" r="4"/>
              <circle cx="200" cy="320" r="4"/>
              <circle cx="200" cy="440" r="4"/>
              <circle cx="360" cy="440" r="4"/>
              <circle cx="360" cy="520" r="4"/>
              <circle cx="160" cy="480" r="4"/>
              <circle cx="160" cy="520" r="4"/>
              <circle cx="480" cy="320" r="4"/>
              <circle cx="480" cy="600" r="4"/>
              <circle cx="420" cy="120" r="4"/>
              <circle cx="420" cy="240" r="4"/>
              <circle cx="480" cy="240" r="4"/>
            </g>
            <!-- IC chip outlines -->
            <rect x="220" y="280" width="80" height="60" stroke="white" stroke-width="1" fill="none"/>
            <rect x="380" y="140" width="60" height="50" stroke="white" stroke-width="1" fill="none"/>
            <rect x="60" y="390" width="70" height="55" stroke="white" stroke-width="1" fill="none"/>
            <!-- Chip pins -->
            <g stroke="white" stroke-width="1">
              <line x1="220" y1="300" x2="210" y2="300"/>
              <line x1="220" y1="315" x2="210" y2="315"/>
              <line x1="300" y1="300" x2="310" y2="300"/>
              <line x1="300" y1="315" x2="310" y2="315"/>
              <line x1="240" y1="280" x2="240" y2="270"/>
              <line x1="260" y1="280" x2="260" y2="270"/>
              <line x1="240" y1="340" x2="240" y2="350"/>
              <line x1="260" y1="340" x2="260" y2="350"/>
            </g>
          </svg>
        </div>
      </div>

    </div>
  </main>

</body>
</html>
